name: Lint

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check --all
      - run: cargo clippy --all-targets -- -D warnings
