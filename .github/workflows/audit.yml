name: Audit

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: |
          cargo audit \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2026-0119 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100
        # hickory-proto (0118, 0119): CPU exhaustion + NSEC3 unbounded loop via libp2p, no fixed upgrade
        # gtk-rs GTK3 (0370, 0411-0420): unmaintained, transitive via Tauri Linux webview
        # glib (0429): VariantStrIter unsound, transitive via Tauri
        # pango (0436): unmaintained, transitive via Tauri
        # unic-* (0075, 0080, 0081, 0098, 0100): unmaintained, transitive via Tauri urlpattern
