<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to dark blue -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>

    <!-- Core glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00b8d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
    </radialGradient>

    <!-- Electron gradient -->
    <radialGradient id="electronGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </radialGradient>

    <!-- Orbit glow -->
    <filter id="orbitGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Network node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for the whole icon -->
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern (P2P network feel) -->
  <g opacity="0.08" stroke="#4dd0e1" stroke-width="0.5" fill="none">
    <!-- Horizontal lines -->
    <line x1="40" y1="128" x2="472" y2="128"/>
    <line x1="40" y1="192" x2="472" y2="192"/>
    <line x1="40" y1="256" x2="472" y2="256"/>
    <line x1="40" y1="320" x2="472" y2="320"/>
    <line x1="40" y1="384" x2="472" y2="384"/>
    <!-- Vertical lines -->
    <line x1="128" y1="40" x2="128" y2="472"/>
    <line x1="192" y1="40" x2="192" y2="472"/>
    <line x1="256" y1="40" x2="256" y2="472"/>
    <line x1="320" y1="40" x2="320" y2="472"/>
    <line x1="384" y1="40" x2="384" y2="472"/>
  </g>

  <!-- P2P Network: nodes and edges -->
  <g filter="url(#nodeGlow)">
    <!-- Network edges (connections between nodes) -->
    <g stroke="#00acc1" stroke-width="1.2" opacity="0.3" fill="none">
      <line x1="256" y1="256" x2="130" y2="130"/>
      <line x1="256" y1="256" x2="382" y2="130"/>
      <line x1="256" y1="256" x2="130" y2="382"/>
      <line x1="256" y1="256" x2="382" y2="382"/>
      <line x1="256" y1="256" x2="90" y2="256"/>
      <line x1="256" y1="256" x2="422" y2="256"/>
      <line x1="256" y1="256" x2="256" y2="90"/>
      <line x1="256" y1="256" x2="256" y2="422"/>
      <!-- Cross connections -->
      <line x1="130" y1="130" x2="382" y2="130"/>
      <line x1="130" y1="130" x2="130" y2="382"/>
      <line x1="382" y1="130" x2="382" y2="382"/>
      <line x1="130" y1="382" x2="382" y2="382"/>
    </g>

    <!-- Network outer nodes -->
    <g fill="#00838f" opacity="0.6">
      <circle cx="130" cy="130" r="5"/>
      <circle cx="382" cy="130" r="5"/>
      <circle cx="130" cy="382" r="5"/>
      <circle cx="382" cy="382" r="5"/>
      <circle cx="90" cy="256" r="4"/>
      <circle cx="422" cy="256" r="4"/>
      <circle cx="256" cy="90" r="4"/>
      <circle cx="256" cy="422" r="4"/>
    </g>
  </g>

  <!-- Central atom: orbits and nucleus -->
  <g transform="translate(256, 256)" filter="url(#outerGlow)">

    <!-- Orbit 1: tilted ellipse -->
    <ellipse cx="0" cy="0" rx="110" ry="38" fill="none"
             stroke="url(#coreGlow)" stroke-width="2" opacity="0.7"
             transform="rotate(-30)"
             filter="url(#orbitGlow)"/>

    <!-- Orbit 2: tilted ellipse -->
    <ellipse cx="0" cy="0" rx="110" ry="38" fill="none"
             stroke="#26c6da" stroke-width="2" opacity="0.6"
             transform="rotate(30)"
             filter="url(#orbitGlow)"/>

    <!-- Orbit 3: vertical ellipse -->
    <ellipse cx="0" cy="0" rx="38" ry="110" fill="none"
             stroke="#4dd0e1" stroke-width="2" opacity="0.5"
             filter="url(#orbitGlow)"/>

    <!-- Nucleus glow -->
    <circle cx="0" cy="0" r="28" fill="url(#coreGlow)" opacity="0.5"/>

    <!-- Nucleus -->
    <circle cx="0" cy="0" r="16" fill="#00e5ff" opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="#b2ebf2" opacity="0.7"/>

    <!-- Electron 1: on orbit 1, moving position -->
    <circle cx="85" cy="-35" r="8" fill="url(#electronGrad)"
            transform="rotate(-30)"
            filter="url(#nodeGlow)"/>
    <!-- Electron 1 inner highlight -->
    <circle cx="83" cy="-37" r="3" fill="#e0f7fa" opacity="0.8"
            transform="rotate(-30)"/>

    <!-- Electron 2: on orbit 2 -->
    <circle cx="-75" cy="50" r="8" fill="url(#electronGrad)"
            transform="rotate(30)"
            filter="url(#nodeGlow)"/>
    <circle cx="-77" cy="48" r="3" fill="#e0f7fa" opacity="0.8"
            transform="rotate(30)"/>

    <!-- Electron 3: on orbit 3 -->
    <circle cx="15" cy="-90" r="7" fill="url(#electronGrad)"
            filter="url(#nodeGlow)"/>
    <circle cx="13" cy="-92" r="2.5" fill="#e0f7fa" opacity="0.8"/>
  </g>

  <!-- Subtle corner accents -->
  <g stroke="#00acc1" stroke-width="1" opacity="0.15" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="452,30 482,30 482,60"/>
    <polyline points="482,452 482,482 452,482"/>
    <polyline points="60,482 30,482 30,452"/>
  </g>
</svg>
